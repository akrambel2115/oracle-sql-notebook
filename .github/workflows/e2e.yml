name: E2E Notebook Tests

on:
  workflow_dispatch:

jobs:
  e2e:
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run extension-host e2e tests
        run: npm run test:e2e
